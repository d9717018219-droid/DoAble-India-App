name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          script: |
            cd ${{ secrets.HOSTINGER_APP_PATH }}
            echo "📦 Deploying code to Hostinger..."
            git pull origin main
            echo "📥 Installing dependencies..."
            npm install --legacy-peer-deps
            echo "🔨 Building application..."
            npm run build
            echo "✅ Deployment complete! Your app is updated."
            echo "⚠️  Remember to restart the app in Hostinger Application Manager"

      - name: Deployment Status
        run: echo "✅ Deployment triggered on Hostinger. Check your server!"
