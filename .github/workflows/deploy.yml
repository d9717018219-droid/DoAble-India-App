name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build application
        run: npm run build
      
      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          script: |
            cd ${{ secrets.HOSTINGER_APP_PATH }}
            git pull origin main
            npm install --production
            npm run build
            # Restart the application in Application Manager (manual step)
            echo "✅ Deployment complete! Restart app in Hostinger Application Manager"

      - name: Deployment Status
        run: echo "✅ Code deployed to Hostinger. New build ready!"
