name: Build Android App Bundle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Build React app
      run: npm run build

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Build Android App Bundle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew bundleRelease
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk

    - name: Rename AAB file
      run: |
        mv android/app/build/outputs/bundle/release/app-release.aab android/app/build/outputs/bundle/release/com.doableindia.aab

    - name: Upload AAB file
      uses: actions/upload-artifact@v3
      with:
        name: com.doableindia.aab
        path: android/app/build/outputs/bundle/release/com.doableindia.aab

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.0.${{ github.run_number }}
        release_name: Release v1.0.${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: android/app/build/outputs/bundle/release/com.doableindia.aab
        asset_name: com.doableindia.aab
        asset_content_type: application/octet-stream
