name: Build Android App Bundle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Clean dependencies
      run: |
        rm -rf node_modules package-lock.json

    - name: Install dependencies
      run: npm install

    - name: Build React app
      run: npm run build

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Android App Bundle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew bundleRelease
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk

    - name: Rename AAB file
      run: |
        mv android/app/build/outputs/bundle/release/app-release.aab android/app/build/outputs/bundle/release/com.doableindia.aab

    - name: Upload AAB as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: com.doableindia.aab
        path: android/app/build/outputs/bundle/release/com.doableindia.aab
        retention-days: 30
